name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-tests:
    name: Node tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          # Node 24+: built-in node:sqlite is unflagged. Project requires >= 22.5.
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  sidecar-tests:
    name: STT sidecar tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stt_sidecar
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: stt_sidecar/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        # Tests inject a FakeModel, so no whisper model is downloaded.
        run: python -m pytest test_server.py -q
